# Behaviour Rig System Configuration
# ==================================
#
# This file defines the configuration for each behaviour rig in the system.
# Add or modify entries as needed for your setup.
#
# Each rig entry should include:
#   - name: Display name for the rig
#   - behaviour_board: Board tag for the rig's behaviour Arduino (looked up in board_registry.json)
#   - daq_board: Board tag for the rig's DAQ Arduino (looked up in board_registry.json)
#   - enabled: Whether the rig is available for use
#   - description: Optional description of the rig
#   - camera_serial: Serial number for the rig's camera
#   - scales.board_tag: Board tag for the scales serial adapter (looked up in board_registry.json)

# Board registry file
# -------------------
# Path to the JSON file that maps human-readable board tags to USB
# serial numbers (VID/PID/serial_number). This replaces hardcoded COM
# ports and makes connections robust to port reassignment.

board_registry: "C:\\Dev\\projects\\hex_behav\\hex_behav_control\\behaviour_rig_system\\config\\board_registry.json"

rigs:
  - name: "Rig 1"
    behaviour_board: "rig_1_behaviour"
    daq_board: "rig_1_daq"
    enabled: true
    description: "Main behaviour rig"
    camera_serial: "24243513"
    scales:
      board_tag: "rig_1_scales"
      is_wired: True
      calibration_scale: 0.22375971500351627
      calibration_intercept: -5617.39

  - name: "Rig 2"
    behaviour_board: "rig_2_behaviour"
    daq_board: "rig_2_daq"
    enabled: true
    description: "Secondary rig"
    camera_serial: "20530175"
    scales:
      board_tag: "rig_2_scales"
      is_wired: true
      calibration_scale: 0.27978473586250524
      calibration_intercept: 475.86

  - name: "Rig 3"
    behaviour_board: "rig_3_behaviour"
    daq_board: "rig_3_daq"
    enabled: true
    description: "Third rig"
    camera_serial: "24174008"
    scales:
      board_tag: "rig_3_scales"
      is_wired: true
      calibration_scale: 0.1725046376146776
      calibration_intercept: -1327.66

  - name: "Rig 4"
    behaviour_board: "rig_4_behaviour"
    daq_board: "rig_4_daq"
    enabled: true
    description: "Fourth rig"
    camera_serial: "24243513"
    scales:
      board_tag: "rig_4_scales"
      is_wired: true
      calibration_scale: 0.16461420192565693
      calibration_intercept: -616.28


# Global settings
# ---------------

global:
  # Default baud rate for all rigs
  baud_rate: 115200

  # Whether to reset Arduino on connection
  reset_on_connect: true

  # Log level (DEBUG, INFO, WARNING, ERROR)
  log_level: "INFO"


# Cohort folders
# --------------
# List of cohort folders that can be selected in the GUI.
# Sessions will be saved to the selected directory.
# Add new cohort folders as needed.

cohort_folders:
  - name: "Test output"
    directory: "D:\\behaviour_data\\default"
    description: "Default folder for testing"
  - name: "January 2025 cohort"
    directory: "D:\\behaviour_data\\cohort_2025_01"
    description: "January 2025 cohort"
  - name: "February 2025 cohort"
    directory: "D:\\behaviour_data\\cohort_2025_02"
    description: "February 2025 cohort"


# Mouse IDs
# ---------
# List of mouse IDs that can be selected in the GUI.
# Add/remove mice as needed for your current experiments.

mice:
  - id: "T1"
    description: "Photometry"
  - id: "T2"
    description: "Electrophysiology, SC plus chrmine opsin"
  - id: "T3"
    description: ""
  - id: "T4"
    description: ""


# External processes
# ------------------

processes:
  # Python executable path
  python_path: "C:\\Users\\Stefan R Coltman\\.conda\\envs\\behaviour_analysis\\python.exe"
  
  # Arduino DAQ / serial listen script (now in DAQLink library)
  serial_listen_script: "C:\\Dev\\projects\\hex_behav\\hex_behav_control\\DAQLink\\src\\DAQLink\\serial_listen.py"
  
  # Camera executable
  camera_executable: "C:\\Dev\\projects\\Camera\\x64\\Release\\Camera_to_binary.exe"
  
  # Timeout for Arduino connection signal (seconds)
  connection_timeout: 30
  
  # Camera settings
  camera_fps: 30
  camera_window_width: 640
  camera_window_height: 512


# Protocol defaults
# -----------------
# Default parameter values that apply to all protocols
# Individual protocols can override these

protocol_defaults:
  component_delay: 0.3
  section_delay: 1.0
